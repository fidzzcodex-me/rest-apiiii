<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Falcon API</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk',sans-serif;background:#F5F5F0;color:#0A0A0A;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{border:3px solid #0A0A0A;box-shadow:8px 8px 0 #0A0A0A;background:#fff;padding:48px;max-width:480px;width:100%;text-align:center}
.code{font-family:'Space Mono',monospace;font-size:5rem;font-weight:900;line-height:1;background:#FFFF00;border:3px solid #0A0A0A;display:inline-block;padding:8px 24px;margin-bottom:24px}
h1{font-size:1.5rem;font-weight:900;margin-bottom:12px;letter-spacing:-0.03em}
p{font-family:'Space Mono',monospace;font-size:0.85rem;opacity:0.6;margin-bottom:32px}
a{display:inline-block;background:#0A0A0A;color:#FFFF00;font-family:'Space Mono',monospace;font-size:0.85rem;font-weight:700;padding:12px 28px;border:3px solid #0A0A0A;box-shadow:4px 4px 0 #0A0A0A;text-decoration:none;letter-spacing:1px;transition:0.15s ease}
a:hover{transform:translate(-3px,-3px);box-shadow:7px 7px 0 #0A0A0A}
</style>
</head>
<body>
<div class="box">
  <div class="code">404</div>
  <h1>Halaman Tidak Ditemukan</h1>
  <p>Endpoint yang kamu cari tidak ada.</p>
  <a href="/">← Kembali ke Beranda</a>
</div>
</body>
</html>
