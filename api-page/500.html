<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>500 — Falcon API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--black:#0a0a0a;--red:#FF1744;--gray:#f0ede6;--border:3px solid var(--black)}
    body{font-family:'Space Grotesk',sans-serif;background:var(--red);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .box{background:#fff;border:var(--border);box-shadow:8px 8px 0 var(--black);padding:48px 44px;max-width:500px;width:100%;text-align:center}
    .code{font-family:'Space Mono',monospace;font-size:6rem;font-weight:700;line-height:1;letter-spacing:-4px;color:var(--black);display:block;margin-bottom:8px}
    .label{display:inline-block;background:var(--red);color:#fff;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:5px 14px;margin-bottom:18px}
    h1{font-size:1.35rem;font-weight:800;color:var(--black);margin-bottom:10px}
    p{font-family:'Space Mono',monospace;font-size:13px;color:#555;line-height:1.6;margin-bottom:28px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:var(--black);color:#fff;font-family:'Space Mono',monospace;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:0.5px;border:var(--border);box-shadow:4px 4px 0 var(--black);text-decoration:none;transition:all .12s}
    .btn:hover{background:#FF1744;color:#fff;transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--black)}
  </style>
</head>
<body>
  <div class="box">
    <span class="code">500</span>
    <span class="label">Server Error</span>
    <h1>Terjadi kesalahan server</h1>
    <p>Ada yang salah di sisi kami. Tim kami sudah diberitahu. Coba lagi dalam beberapa saat.</p>
    <a href="/" class="btn">← Kembali ke Beranda</a>
  </div>
</body>
</html>
